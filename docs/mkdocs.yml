site_name: Evolutionary OpenRLHF
site_description: 进化强化学习框架 - 基于OpenRLHF的种群进化训练
repo_url: https://github.com/你的用户名/evolutionary-openrlhf
repo_name: evolutionary-openrlhf

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - 首页: index.md
  - 入门指南: getting-started.md
  - 核心概念: core-concepts.md
  - 模块接口:
      - 进化训练器: api/evolution_trainer.md
      - 种群管理: api/population.md
      - 个体定义: api/individual.md
      - 扩散奖励模型: api/diffusion_reward.md
      - 数据工具: api/data_utils.md
  - 内置示例: examples.md
  - 开发扩展: development.md

plugins:
  - search

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
